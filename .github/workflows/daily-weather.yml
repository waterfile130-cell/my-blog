name: 每日天气自动更

on:
  schedule:
    # 这里的 Cron 语法是 UTC 时间。
    # 北京时间 8:00 = UTC 0:00
    - cron: '0 0 * * *'
  # 允许你手动点击按钮触发（方便测试）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 拉取代码
      uses: actions/checkout@v3

    - name: 2. 准备 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 3. 安装依赖库
      run: |
        pip install requests pytz

    - name: 4. 运行天气脚本
      run: |
        python scripts/weather.py

    - name: 5. 把新文章推送到仓库
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add content/posts/
        # 如果没有变化（比如一天跑了两次），就不提交，防止报错
        git commit -m "自动更新天气文章" || exit 0
        git push